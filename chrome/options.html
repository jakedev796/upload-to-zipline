<!DOCTYPE html>
<html>
<head>
    <title>Upload to Zipline Settings</title>
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }
        .toggle-row input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        .toggle-row label {
            margin-top: 0;
        }
        .indent {
            margin-left: 24px;
        }
        button {
            margin-top: 20px;
            padding: 5px 10px;
        }
        #status {
            margin-top: 10px;
            font-weight: bold;
        }
        hr {
            margin-top: 20px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
<h2>Zipline Uploader Settings</h2>

<label for="requestURL">Request URL:</label>
<input type="text" id="requestURL">

<label for="authToken">Authorization Token:</label>
<input type="text" id="authToken">

<hr>
<h3>Advanced Options</h3>

<div class="toggle-row">
    <input type="checkbox" id="expiryEnabled">
    <label for="expiryEnabled">Enable auto-delete after expiry time</label>
</div>
<div class="indent">
    <label for="expiryTime">Expiry time:</label>
    <select id="expiryTime">
        <option value="1h">1 hour</option>
        <option value="6h">6 hours</option>
        <option value="1d">1 day</option>
        <option value="3d">3 days</option>
        <option value="7d" selected>7 days</option>
        <option value="14d">14 days</option>
        <option value="30d">30 days</option>
        <option value="90d">90 days</option>
        <option value="1y">1 year</option>
    </select>
</div>

<div class="toggle-row">
    <input type="checkbox" id="maxViewsEnabled">
    <label for="maxViewsEnabled">Enable max view count limit</label>
</div>
<div class="indent">
    <label for="maxViews">Max views before deletion:</label>
    <input type="number" id="maxViews" min="1" placeholder="100">
</div>

<div class="toggle-row">
    <input type="checkbox" id="shortenEnabled">
    <label for="shortenEnabled">Enable right-click URL shortening</label>
</div>

<button id="save">Save</button>

<div id="status"></div>

<script src="options.js"></script>
</body>
</html>
